name: PR Intake Gate

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-intake-gate:
    name: pr-intake-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout trusted base code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run PR intake gate
        # Pinned from repo-governance main.
        # pull_request_target must not execute mutable tags.
        uses: heurema/repo-governance/actions/pr-intake-gate@a1f0c72edbbbe0513471b973e5afc799e7c51da1
        with:
          policy-path: .github/pr-intake-gate.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          codex-review-gate: 'false'
