project:
  name: 'Shared Intake Governance'

high_risk:
  description: 'workflows, contributor governance, schemas, profiles, agent instructions, source/consumer contracts, threat model, implementation guide, runtime code, provider adapters, and security-sensitive boundaries'

trivial:
  max_changed_lines: 30
  allowed_path_globs:
    - 'README.md'
    - 'SUPPORT.md'
    - 'CODE_OF_CONDUCT.md'
    - 'TRADEMARKS.md'
    - 'NOTICE'
    - 'LICENSE'
    - 'docs/**/*.md'

high_risk_path_globs:
  - '.github/**'
  - 'AGENTS.md'
  - 'CONTRIBUTING.md'
  - 'SECURITY.md'
  - 'schemas/**'
  - 'profiles/**'
  - 'docs/00-product-brief.md'
  - 'docs/01-architecture.md'
  - 'docs/02-data-contracts.md'
  - 'docs/03-provider-adapters.md'
  - 'docs/05-threat-model.md'
  - 'docs/06-agent-session-guide.md'
  - 'docs/07-source-onboarding.md'
  - 'docs/08-consumer-onboarding.md'
  - 'docs/09-operating-model.md'
  - 'docs/10-implementation-guide.md'
  - 'src/**'
  - 'scripts/**'
  - 'tests/**'
  - 'pyproject.toml'
  - 'requirements*.txt'
  - 'package.json'
  - 'package-lock.json'
  - 'pnpm-lock.yaml'
  - 'yarn.lock'
  - 'bun.lockb'
  - 'Dockerfile'
  - 'docker/**'
  - '**/auth/**'
  - '**/security/**'
  - '**/crypto/**'
  - '**/migrations/**'

instruction_surface:
  description: 'Shared Intake Governance docs and metadata that AI agents may read as instructions, contracts, operating truth, or PR governance context'
  path_globs:
    - 'README.md'
    - 'README*.md'
    - 'AGENTS.md'
    - '**/AGENTS.md'
    - 'CLAUDE.md'
    - '**/CLAUDE.md'
    - 'GEMINI.md'
    - '**/GEMINI.md'
    - 'SKILL.md'
    - '**/SKILL.md'
    - '.github/PULL_REQUEST_TEMPLATE.md'
    - '.github/pull_request_template.md'
    - '.github/pull_request_template/**'
    - '.github/ISSUE_TEMPLATE/**'
    - '.github/copilot-instructions.md'
    - '.github/pr-intake-gate.yml'
    - 'docs/**'
    - 'schemas/**'
    - 'profiles/**'

prompt_injection:
  enabled: true
  description: 'detect obvious prompt-injection-like additions in external PRs before ordinary review'
  text_path_globs:
    - '*.md'
    - '**/*.md'
    - '*.mdx'
    - '**/*.mdx'
    - '*.txt'
    - '**/*.txt'
    - '*.json'
    - '**/*.json'
    - '*.yml'
    - '**/*.yml'
    - '*.yaml'
    - '**/*.yaml'
    - '.github/**'
    - 'docs/**'
    - 'schemas/**'
    - 'profiles/**'

trusted_authors:
  permissions:
    - 'admin'
    - 'maintain'
    - 'write'
  fallback_author_associations:
    - 'OWNER'
    - 'MEMBER'
    - 'COLLABORATOR'

external_context:
  required_sections:
    - 'Problem'
    - 'Why now'
    - 'Existing options checked'
    - 'Alternatives considered'
    - 'No-code alternative'
    - 'Why code is needed'
  no_code_section: 'No-code alternative'
  first_time_author_associations:
    - 'FIRST_TIMER'
    - 'FIRST_TIME_CONTRIBUTOR'

labels:
  pass: 'intake/pass'
  needs_intent: 'intake/needs-linked-intent'
  needs_more_context: 'intake/needs-more-context'
  no_code_alternative: 'intake/no-code-alternative'
  high_risk: 'intake/high-risk'
  accepted_for_pr: 'intake/accepted-for-pr'
  first_time: 'intake/first-time-contributor'
  override: 'maintainer/override-intake'

linked_intent:
  description: 'a GitHub Issue, Discussion, ADR, research note, docs decision, roadmap item, or tracked implementation intent'
  accept_patterns:
    - '#\d+'
    - 'issues/\d+'
    - 'discussions/\d+'
    - '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+'
    - 'https://github.com/[^/\s]+/[^/\s]+/(issues|discussions)/\d+'
    - 'docs/adr/[A-Za-z0-9._/-]+\.md'
    - 'docs/research/[A-Za-z0-9._/-]+\.md'
    - 'docs/[0-9][0-9]-[A-Za-z0-9._/-]+\.md'
    - 'docs/04-mvp-roadmap\.md'
    - 'docs/10-implementation-guide\.md'

label_details:
  intake/pass:
    color: '2ea44f'
    description: 'PR intake passed'
  intake/needs-linked-intent:
    color: 'd29922'
    description: 'PR needs linked Issue, Discussion, docs decision, roadmap, or implementation intent'
  intake/needs-more-context:
    color: 'd29922'
    description: 'External PR needs required problem, timing, option, and alternative context'
  intake/no-code-alternative:
    color: 'd29922'
    description: 'External PR needs no-code alternative analysis'
  intake/high-risk:
    color: 'cf222e'
    description: 'PR touches high-risk shared intake governance surfaces and needs maintainer attention'
  intake/accepted-for-pr:
    color: '0969da'
    description: 'Maintainer accepted external PR intent for ordinary review'
  intake/first-time-contributor:
    color: 'bf8700'
    description: 'External PR author appears to be a first-time contributor'
  maintainer/override-intake:
    color: '8250df'
    description: 'Maintainer accepts PR intake override responsibility'

bot_comment:
  marker: '<!-- shared-intake-governance-pr-intake-gate -->'
