name: Feature request
description: Propose a bounded improvement that fits the current docs/contracts-first scope
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please ground proposals in the current docs/contracts-first boundaries.

        Runtime collectors, sanitizers, projectors, provider adapters, daemons, dashboards, and side-effect execution require explicit scope opening.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: A short one-line proposal
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      description: What user, operator, governance, or repo problem does this solve?
      placeholder: Describe the problem first, not the solution
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see added or changed?
      placeholder: Describe the bounded change
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: Why this fits now
      description: Cite the current docs or explain why it stays within project boundaries
      placeholder: Reference docs/INDEX.md, docs/04-mvp-roadmap.md, docs/10-implementation-guide.md, or related docs
    validations:
      required: true

  - type: checkboxes
    id: runtime_scope
    attributes:
      label: Runtime scope
      options:
        - label: This request does not require runtime implementation.
        - label: This request opens runtime scope and should follow docs/10-implementation-guide.md.

  - type: textarea
    id: non_goals
    attributes:
      label: Out of scope / non-goals
      description: What this request should explicitly not become
      placeholder: List boundaries to avoid silent scope expansion

  - type: textarea
    id: proof
    attributes:
      label: Supporting material
      description: Related issues, examples, docs, references, or prototype notes
